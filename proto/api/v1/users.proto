syntax = "proto3";

package api.v1;

import "google/protobuf/empty.proto";
import "api/v1/common.proto";

// UserService handles the authenticated user's own profile, settings,
// push tokens, and notification preferences.
service UserService {
  rpc GetMe(google.protobuf.Empty) returns (User);
  rpc UpdateMe(UpdateMeRequest) returns (User);
  rpc DeleteMe(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc GetUser(GetUserRequest) returns (PublicUser);

  // UploadAvatar streams an avatar image to server-side object storage. The
  // first message must carry content_type; subsequent messages carry file
  // chunks. Size and content type are validated server-side.
  rpc UploadAvatar(stream UploadAvatarRequest) returns (UploadAvatarResponse);

  rpc GetSettings(google.protobuf.Empty) returns (Settings);
  rpc UpdateSettings(Settings) returns (Settings);

  rpc RegisterPushToken(RegisterPushTokenRequest) returns (google.protobuf.Empty);
  rpc GetNotificationPreferences(google.protobuf.Empty) returns (NotificationPreferences);
  rpc UpdateNotificationPreferences(NotificationPreferences) returns (NotificationPreferences);
}

message UpdateMeRequest {
  optional string first_name = 1;
  optional string last_name = 2;
  optional string bio = 3;
  optional string avatar = 4;
}

message GetUserRequest {
  string id = 1;
}

message UploadAvatarRequest {
  oneof data {
    string content_type = 1;
    bytes chunk = 2;
  }
}

message UploadAvatarResponse {
  string avatar_url = 1;
}

message RegisterPushTokenRequest {
  string device_id = 1;
  string token = 2;
  string platform = 3;
  string app_version = 4;
}

message NotificationPreferences {
  bool push = 1;
  bool email = 2;
  bool marketing = 3;
  bool quiet_hours_enabled = 4;
  string quiet_hours_start = 5;
  string quiet_hours_end = 6;
  string timezone = 7;
}
