version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - dogsled
    - dupl
    - errcheck
    - errorlint
    - forbidigo
    - funlen
    - gocheckcompilerdirectives
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - godox
    - goprintffuncname
    - gosec
    - govet
    - intrange
    - ineffassign
    - lll
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - revive
    - staticcheck
    - tagliatelle
    - testifylint
    - unconvert
    - unparam
    - unused
    - whitespace

  settings:
    depguard:
      rules:
        logger:
          deny:
            - pkg: "github.com/sirupsen/logrus"
              desc: logging is allowed only by logutils.Log.
            - pkg: "github.com/pkg/errors"
              desc: should use standard `errors` package.
            - pkg: "github.com/instana/testify"
              desc: use github.com/stretchr/testify instead.
          files:
            - "!**/pkg/logutils/**.go"

    dupl:
      threshold: 100

    funlen:
      lines: 200
      statements: 100

    goconst:
      min-len: 2
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint

    gocyclo:
      min-complexity: 30

    godox:
      keywords:
        - FIXME

    govet:
      settings:
        printf:
          funcs:
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Infof
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Warnf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Errorf
            - (github.com/golangci/golangci-lint/v2/pkg/logutils.Log).Fatalf
      enable:
        - nilness
        - shadow

    errorlint:
      asserts: false

    forbidigo:
      forbid:
        - pattern: '\.JSON\(http\.StatusInternalServerError'
          msg: >-
            handlers must return an error to httpx.Wrap, never
            write a 500 with c.JSON directly. Sentinels surfaced
            to HTTP must be *HTTPError.
        - pattern: 'panic\('
          msg: >-
            services must not panic; return *HTTPError instead.
            Repositories may panic for unexpected infra failures.
            Workers must wrap ProcessTask in defer recover().
      analyze-types: false
      exclude-godoc-examples: true

    tagliatelle:
      case:
        rules:
          json: snake
          yaml: snake
          xml: camel
          bson: camel
          avro: snake
          mapstructure: kebab

    lll:
      line-length: 120
      tab-width: 4

    misspell:
      locale: US
      ignore-rules:
        - centre

    nolintlint:
      allow-unused: false
      require-explanation: true
      require-specific: true

    revive:
      rules:
        - name: indent-error-flow
        - name: unused-parameter
          disabled: true
        - name: unused-receiver
          disabled: true

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gocyclo
          - errcheck
          - dupl
          - gosec
          - forbidigo
          - tagliatelle
          - goconst
      - path: internal/errors/codes/
        linters:
          - dupl
      - path: repository\.go
        linters:
          - forbidigo
        text: 'panic\('
      - path: cmd/
        linters:
          - forbidigo
        text: 'panic\('
      - path: internal/app/
        linters:
          - forbidigo
        text: 'panic\('
      - path: internal/worker/
        linters:
          - forbidigo
        text: 'panic\('
      - path: pkg/
        linters:
          - forbidigo
        text: 'panic\('
      - path: internal/hmac/
        text: "weak cryptographic primitive"
        linters:
          - gosec
      - path: internal/platform/cache/cachekey\.go
        text: "G101"
        linters:
          - gosec
      - path: tests/
        linters:
          - gosec
      - linters:
          - staticcheck
        text: "SA9003:"
      - linters:
          - lll
        source: "^//go:generate "
      - linters:
          - lll
        source: ".*`.*`$"
      - linters:
          - lll
        source: "^\\s*//.*"
      - path: swagger/
        linters:
          - lll

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      rewrite-rules:
        - pattern: "interface{}"
          replacement: "any"

    goimports:
      local-prefixes:
        - github.com/isyll/go-api-starter
