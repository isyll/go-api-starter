version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/isyll/go-grpc-starter/internal/gen
plugins:
  - local: protoc-gen-go
    out: internal/gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: internal/gen
    opt: paths=source_relative
