version: v2
managed:
  enabled: true
  disable:
    # Keep vendored modules (google.api annotations, buf.validate) pointing at
    # their canonical Go packages rather than our local gen/ prefix.
    - module: buf.build/googleapis/googleapis
      file_option: go_package
    - module: buf.build/bufbuild/protovalidate
      file_option: go_package
  override:
    - file_option: go_package_prefix
      value: github.com/isyll/go-grpc-starter/gen
plugins:
  - local: protoc-gen-go
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-go-grpc
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-grpc-gateway
    out: gen
    opt: paths=source_relative
  - local: protoc-gen-openapiv2
    out: gen/openapiv2
