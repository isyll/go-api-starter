auth:
  max_inactivity_timeout: ${MAX_INACTIVITY_TIMEOUT:-1440h}
  max_devices_per_user: ${MAX_DEVICES_PER_USER:-5}
  oat:
    access_token_expiry: ${OAT_ACCESS_TOKEN_EXPIRY:-30m}
    refresh_token_expiry: ${OAT_REFRESH_TOKEN_EXPIRY:-720h}

id_obfuscation:
  min_length: 10
  alphabet: "vortexqabcfghijkmnpuwydz986731254s"

# argon2id password hashing cost. Defaults (OWASP-ish) are applied when unset.
password_hash:
  memory: ${ARGON2_MEMORY_KIB:-65536}
  iterations: ${ARGON2_ITERATIONS:-3}
  parallelism: ${ARGON2_PARALLELISM:-2}
  salt_length: 16
  key_length: 32
