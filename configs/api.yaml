app:
  name: ${APP_NAME:-go-api-starter}
  version: ${APP_VERSION:-0.1.0}

server:
  port: ${SERVER_PORT:-8080}
  read_timeout: 30s
  write_timeout: 30s
  request_timeout: 25s
  shutdown_timeout: 10s
  idle_timeout: 60s

i18n:
  default_language: ${DEFAULT_LANGUAGE:-en}
  locales_dir: "./locales"

pagination:
  default_page_size: 25
  max_page_size: 100
