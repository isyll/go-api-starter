syntax = "proto3";

package admin.v1;

import "google/protobuf/empty.proto";
import "common/v1/common.proto";

// AdminService is guarded by the admin role. It manages users and
// moderation.
service AdminService {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc GetUser(AdminGetUserRequest) returns (common.v1.User);
  rpc SuspendUser(SuspendUserRequest) returns (google.protobuf.Empty);
  rpc UnsuspendUser(UnsuspendUserRequest) returns (google.protobuf.Empty);
  rpc SetUserRole(SetUserRoleRequest) returns (google.protobuf.Empty);
}

message ListUsersRequest {
  common.v1.Page page = 1;
}

message ListUsersResponse {
  repeated common.v1.User users = 1;
  int64 total = 2;
}

message AdminGetUserRequest {
  string id = 1;
}

message SuspendUserRequest {
  string id = 1;
  string reason = 2;
  string details = 3;
  bool permanent = 4;
  // Days is the suspension length when not permanent.
  int32 days = 5;
}

message UnsuspendUserRequest {
  string id = 1;
}

message SetUserRoleRequest {
  string id = 1;
  string role = 2;
}
