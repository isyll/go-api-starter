syntax = "proto3";

package auth.v1;

import "google/protobuf/empty.proto";
import "common/v1/common.proto";

// AuthService handles registration, login, tokens, and devices.
service AuthService {
  rpc Register(RegisterRequest) returns (common.v1.TokenPair);
  rpc Login(LoginRequest) returns (common.v1.TokenPair);
  rpc RefreshToken(RefreshTokenRequest) returns (common.v1.TokenPair);
  rpc Logout(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc VerifyEmail(VerifyEmailRequest) returns (google.protobuf.Empty);
  rpc ResendVerification(google.protobuf.Empty) returns (google.protobuf.Empty);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (google.protobuf.Empty);
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty);
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty);
  rpc ListDevices(google.protobuf.Empty) returns (ListDevicesResponse);
  rpc RevokeDevice(RevokeDeviceRequest) returns (google.protobuf.Empty);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
  common.v1.DeviceInfo device = 5;
}

message LoginRequest {
  string email = 1;
  string password = 2;
  common.v1.DeviceInfo device = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1;
}

message VerifyEmailRequest {
  string token = 1;
}

message RequestPasswordResetRequest {
  string email = 1;
}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ChangePasswordRequest {
  string current_password = 1;
  string new_password = 2;
}

message ListDevicesResponse {
  repeated common.v1.Device devices = 1;
}

message RevokeDeviceRequest {
  string device_id = 1;
}
