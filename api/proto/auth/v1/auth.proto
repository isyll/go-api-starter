syntax = "proto3";

package auth.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "common/v1/common.proto";

// AuthService handles registration, login, tokens, and devices.
service AuthService {
  rpc Register(RegisterRequest) returns (common.v1.TokenPair) {
    option (google.api.http) = {
      post: "/v1/auth/register"
      body: "*"
    };
  }
  rpc Login(LoginRequest) returns (common.v1.TokenPair) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }
  rpc RefreshToken(RefreshTokenRequest) returns (common.v1.TokenPair) {
    option (google.api.http) = {
      post: "/v1/auth/token/refresh"
      body: "*"
    };
  }
  rpc Logout(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {post: "/v1/auth/logout"};
  }
  rpc VerifyEmail(VerifyEmailRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/email/verify"
      body: "*"
    };
  }
  rpc ResendVerification(google.protobuf.Empty) returns (google.protobuf.Empty) {
    option (google.api.http) = {post: "/v1/auth/email/resend"};
  }
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/password/reset-request"
      body: "*"
    };
  }
  rpc ResetPassword(ResetPasswordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/password/reset"
      body: "*"
    };
  }
  rpc ChangePassword(ChangePasswordRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/v1/auth/password/change"
      body: "*"
    };
  }
  rpc ListDevices(google.protobuf.Empty) returns (ListDevicesResponse) {
    option (google.api.http) = {get: "/v1/auth/devices"};
  }
  rpc RevokeDevice(RevokeDeviceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {delete: "/v1/auth/devices/{device_id}"};
  }
}

message RegisterRequest {
  string email = 1 [(buf.validate.field).string.email = true, (buf.validate.field).string.max_len = 254];
  string password = 2 [(buf.validate.field).string.min_len = 8, (buf.validate.field).string.max_len = 128];
  string first_name = 3 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 100];
  string last_name = 4 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 100];
  common.v1.DeviceInfo device = 5;
}

message LoginRequest {
  string email = 1 [(buf.validate.field).string.email = true, (buf.validate.field).string.max_len = 254];
  string password = 2 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
  common.v1.DeviceInfo device = 3;
}

message RefreshTokenRequest {
  string refresh_token = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 512];
}

message VerifyEmailRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
}

message RequestPasswordResetRequest {
  string email = 1 [(buf.validate.field).string.email = true, (buf.validate.field).string.max_len = 254];
}

message ResetPasswordRequest {
  string token = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
  string new_password = 2 [(buf.validate.field).string.min_len = 8, (buf.validate.field).string.max_len = 128];
}

message ChangePasswordRequest {
  string current_password = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
  string new_password = 2 [(buf.validate.field).string.min_len = 8, (buf.validate.field).string.max_len = 128];
}

message ListDevicesResponse {
  repeated common.v1.Device devices = 1;
}

message RevokeDeviceRequest {
  string device_id = 1 [(buf.validate.field).string.min_len = 1, (buf.validate.field).string.max_len = 128];
}
